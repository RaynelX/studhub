<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />

    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />

    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="StudHub" />

    <meta name="description" content="Расписание, домашние задания и всё необходимое для студентов группы — в одном месте" />

    <!-- Open Graph / Telegram -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="StudHub" />
    <meta property="og:description" content="Расписание, домашние задания и всё необходимое для студентов группы — в одном месте" />
    <meta property="og:image" content="/icons/icon-512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />

    <title>StudHub</title>

    <style>
      html, body, #root {
        margin: 0;
        padding: 0;
        height: 100dvh;
        width: 100vw;
        overflow: hidden;
      }
      html {
        background: #ffffff;
        overscroll-behavior: none;

        min-height: calc(100% + env(safe-area-inset-top));
        padding: 0 env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        background-attachment: fixed;
        background-position: center;
        background-repeat: no-repeat;
        background-size: cover;
      }
      @media (prefers-color-scheme: dark) {
        html {
          background: #000000;
        }
      }
      * {
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        box-sizing: border-box;
      }
      input, textarea {
        -webkit-user-select: text;
        user-select: text;
      }
      a, button {
        -webkit-touch-callout: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
